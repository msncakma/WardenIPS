# WardenIPS Configuration File

general:
  log_level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  log_file: "/var/log/wardenips/warden.log"
  analysis_interval: 5        # Analyze the last N minutes of connection events

whitelist:
  # IPv4/IPv6 addresses that will NEVER be blocked. Add your IP here!
  ips:
    - "127.0.0.1" # MUST KEEP: localhost
    - "::1" # MUST KEEP: localhost IPv6

  # CIDR ranges that will NEVER be blocked
  cidr_ranges:
    - "10.0.0.0/8" # RFC1918 private network
    - "100.64.0.0/10" # Tailscale default subnet
    - "172.16.0.0/12" # RFC1918 private network

database:
  backend: "sqlite"           # "sqlite" (default) or "redis" (enterprise/cluster)
  sqlite:
    path: "/var/lib/wardenips/warden.db" 
  redis:
    url: "redis://localhost:6379/0"
    prefix: "warden:"
    event_ttl: 86400          # Event retention in Redis (seconds, default 24h)

asn_protection:
  # Uses GeoLite2-ASN.mmdb downloaded automatically from Loyalsoldier/geoip on GitHub.
  # No membership is required. It is fully free and open-source.
  enabled: true
  db_path: "/opt/wardenips/assets/GeoLite2-ASN.mmdb"
  country_db_path: "/var/lib/wardenips/GeoLite2-Country.mmdb"  # Optional; enables dashboard country heatmap enrichment
  auto_update_enabled: true     # Weekly automatic updates from GitHub (Thursdays)
  # Mark traffic from suspicious ASNs as high-risk (increases the risk score)
  # Format: "AS<NUMBER>" (e.g., AS16509 = Amazon) or just the number (16509)
  suspicious_asns:
    # Example: known datacenter ASNs frequently associated with attacks
    # - "AS16509"    # Amazon AWS
    # - "AS14061"    # DigitalOcean
    # - "AS20473"    # Vultr
    # Add your own rules here.

firewall:
  # Action to take when an IP reaches this risk score
  simulation_mode: false       # true = monitor only (no firewall actions)
  ban_threshold: 70
  permanent_ban_default: true   # High-risk bans are permanent by default (manual unban via dashboard)
  ipset:
    set_name: "warden_blacklist"
    default_ban_duration: 0  # Seconds . Use 0 for permanent bans.

abuseipdb:
  # Automatically reports banned IPs to AbuseIPDB
  enabled: false
  api_key: ""
  rate_limit_per_minute: 35

successful_logins:
  enabled: true              # Log successful SSH and Minecraft sign-ins as normal events
  reset_risk_score: true     # Reset recent risk buildup for an IP after a successful login

notifications:
  rate_limit_per_minute: 20   # Max notifications across all channels
  rules:
    on_ban: true              # Alert when automated ban action is taken
    on_burst: true            # Alert on burst-flood auto-bans
    on_manual_ban: true       # Alert when admin manually bans an IP
    min_risk_score: 70        # Minimum risk score for automated ban alerts
  telegram:
    enabled: false
    bot_token: ""             # Get from @BotFather on Telegram
    chat_id: ""               # Your chat or group ID
  discord:
    enabled: false
    webhook_url: ""           # Discord channel webhook URL

dashboard:
  enabled: false
  host: "127.0.0.1"          # Bind address (use 0.0.0.0 for external access)
  port: 7680
  homepage: "dashboard"      # Landing page for / : dashboard, login, or admin
  public_dashboard: true      # Allow the overview dashboard without login; /admin still requires login
  api_key: ""                # Optional Bearer token for API auth
  session_ttl: 600            # Dashboard inactivity timeout in seconds (10 minutes)
  login_rate_limit_per_minute: 10
  bootstrap:
    setup_required: false
    token_hash: ""
    token_expires_at: ""

blocklist:
  enabled: true
  # Your local timezone (e.g. "Europe/Istanbul", "America/New_York")
  # You can find your timezone string here: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  timezone: "UTC"               # Your local timezone (e.g. "Europe/Istanbul", "America/New_York")
  fetch_time: "04:00"           # Daily fetch time in 24h format (HH:MM) in your timezone
  first_setup:
    mode: "7d"                  # "7d" (recommended) or "14d" — initial blocklist period
    url_7d: "https://raw.githubusercontent.com/borestad/blocklist-abuseipdb/main/abuseipdb-s100-7d.ipv4"
    url_14d: "https://raw.githubusercontent.com/borestad/blocklist-abuseipdb/main/abuseipdb-s100-14d.ipv4"
    installed_at: ""            # Auto-set on first run — do not edit manually
    completed: false            # Auto-set when the initial period expires
  daily_url: "https://raw.githubusercontent.com/borestad/blocklist-abuseipdb/main/abuseipdb-s100-1d.ipv4"

plugins:
  ssh:
    enabled: true
    log_path: "/var/log/auth.log"
    max_failed_attempts: 5    # Attempts within analysis_interval before triggering a high score
    
  minecraft:
    enabled: false
    log_path: "/opt/minecraft/logs/latest.log"
    rapid_connection_threshold: 10  # Connections within analysis_interval signaling a botnet
    global_connection_burst_threshold: 12  # Treat 12+ near-simultaneous Minecraft connects as a potential flood
    global_connection_burst_window_seconds: 15
    global_connection_burst_min_unique_ips: 8  # Require multiple source IPs to reduce false positives
    
  nginx:
    enabled: false
    log_path: "/var/log/nginx/access.log"

  portscan:
    enabled: true
    log_path: "/var/log/kern.log"
    scan_threshold: 5
    ignored_ports: []
    # ignored_ports examples for legit game/voice services:
    #  - 19132   # Bedrock
    #  - 24454   # Proximity voice (Simple Voice Chat)
    #  - 9987    # TeamSpeak voice
    trap_ports: #Don't use your actual service ports here, or you may get false positives! These are honeypot (trap) ports to catch scanners.
      - 23    # Telnet
      - 2323  # Mirai
      - 135   # RPC
      - 139   # NetBIOS
      - 445   # SMB
      - 1433  # MSSQL
      - 3389  # RDP
      - 5900  # VNC
