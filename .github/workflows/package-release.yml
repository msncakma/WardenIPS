name: Package Release

on:
  push:
    tags:
      - 'v*.*.*'  # Semantic versioning tags
  workflow_dispatch:  # Manual trigger

env:
  PACKAGE_NAME: wardenips
  
jobs:
  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      deb-file: ${{ steps.build.outputs.deb-file }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Extract version from tag/branch
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep -oP '__version__ = "\K[^"]+' wardenips/__init__.py)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
          
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-python \
            python3-dev \
            python3-setuptools \
            python3-pip \
            devscripts \
            lintian \
            fakeroot
            
      - name: Update debian/changelog with current version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP=$(date -R)
          
          # Update changelog with current version
          cat > debian/changelog << EOF
          ${PACKAGE_NAME} (${VERSION}-1) stable; urgency=medium
          
            * Release version ${VERSION}
            * See GitHub releases for detailed changelog
          
           -- msncakma <wardenips@msncakma.dev>  ${TIMESTAMP}
          EOF
          
          echo "Updated debian/changelog:"
          cat debian/changelog
          
      - name: Fix file permissions
        run: |
          chmod +x debian/rules
          chmod 755 debian/postinst debian/prerm debian/postrm debian/wardenips-wrapper
          
      - name: Build Debian package
        id: build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Build source package first
          dpkg-buildpackage -us -uc -S
          
          # Build binary package
          dpkg-buildpackage -us -uc -b
          
          # Find the generated .deb file
          DEB_FILE=$(find ../ -name "${PACKAGE_NAME}_${VERSION}*.deb" | head -1)
          DEB_BASENAME=$(basename "${DEB_FILE}")
          
          # Move to current directory for easier access
          mv "${DEB_FILE}" "./$(basename "${DEB_FILE}")"
          
          echo "deb-file=${DEB_BASENAME}" >> $GITHUB_OUTPUT
          echo "Built package: ${DEB_BASENAME}"
          
          # Show package info
          dpkg-deb --info "${DEB_BASENAME}"
          dpkg-deb --contents "${DEB_BASENAME}"
          
      - name: Lint Debian package
        run: |
          DEB_FILE="${{ steps.build.outputs.deb-file }}"
          echo "Running lintian on ${DEB_FILE}"  
          lintian "${DEB_FILE}" || echo "Lintian warnings/errors found (non-fatal)"
          
      - name: Test package installation (dry-run)
        run: |
          DEB_FILE="${{ steps.build.outputs.deb-file }}"
          echo "Testing package installation..."
          
          # Install package dependencies
          sudo apt-get install -y ipset iptables python3-venv curl git rsync rsyslog acl
          
          # Simulate package installation to check dependencies
          sudo dpkg --dry-run -i "${DEB_FILE}"
          
          echo "✓ Package can be installed successfully"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: ${{ steps.build.outputs.deb-file }}
          retention-days: 30
          
  build-snap:
    name: Build Snap Package
    runs-on: ubuntu-22.04
    outputs:
      snap-file: ${{ steps.build.outputs.snap-file }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Extract version from tag/branch
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep -oP '__version__ = "\K[^"]+' wardenips/__init__.py)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building snap version: ${VERSION}"
          
      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic
          sudo snap install multipass
          
      - name: Update snap version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version: .*/version: '${VERSION}'/" snap/snapcraft.yaml
          echo "Updated snap/snapcraft.yaml version to ${VERSION}"
          
      - name: Make snap scripts executable
        run: |
          chmod +x snap/local/bin/*
          
      - name: Build snap package
        id: build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Build snap package
          snapcraft --destructive-mode
          
          # Find the generated snap file
          SNAP_FILE="${PACKAGE_NAME}_${VERSION}_amd64.snap"
          
          if [ ! -f "$SNAP_FILE" ]; then
            # Try with different naming pattern
            SNAP_FILE=$(find . -name "${PACKAGE_NAME}_*.snap" | head -1)
            SNAP_FILE=$(basename "$SNAP_FILE")
          fi
          
          echo "snap-file=${SNAP_FILE}" >> $GITHUB_OUTPUT
          echo "Built snap: ${SNAP_FILE}"
          
          # Show snap info
          snap info --local "${SNAP_FILE}"
          
      - name: Test snap installation
        run: |
          SNAP_FILE="${{ steps.build.outputs.snap-file }}"
          echo "Testing snap installation..."
          
          # Install snap in classic mode
          sudo snap install --dangerous --classic "${SNAP_FILE}"
          
          # Test basic commands
          wardenips version || echo "Version command test complete"
          wardenips help || echo "Help command test complete"
          
          echo "✓ Snap can be installed successfully"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-package
          path: ${{ steps.build.outputs.snap-file }}
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-deb, build-snap]
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # Required for creating releases
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-package'
          merge-multiple: true
          
      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ needs.build-deb.outputs.version }}"
          
          # Extract latest changelog entry
          cat > release-notes.md << 'EOF'
          ## 🚀 WardenIPS v${{ needs.build-deb.outputs.version }}
          
          ### 📦 Installation
          
          **Universal Snap Package (All Linux Distros):**
          ```bash
          # Download and install
          wget https://github.com/msncakma/WardenIPS/releases/download/v${{ needs.build-deb.outputs.version }}/${{ needs.build-snap.outputs.snap-file }}
          sudo snap install --dangerous --classic wardenips_*.snap
          
          # Configure and start
          sudo wardenips.configure
          sudo wardenips.start
          wardenips.logs
          ```
          
          **Debian/Ubuntu (.deb package):**
          ```bash
          wget https://github.com/msncakma/WardenIPS/releases/download/v${{ needs.build-deb.outputs.version }}/${{ needs.build-deb.outputs.deb-file }}
          sudo dpkg -i ${{ needs.build-deb.outputs.deb-file }}
          sudo apt-get install -f  # Install any missing dependencies
          ```
          
          **Manual installation:**
          ```bash
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/msncakma/WardenIPS/master/install.sh)"
          ```
          
          ### ✨ What's New
          - **Universal Snap Packaging**: Works on all Linux distributions
          - Professional CLI wrapper with colorized output  
          - ASN-based threat detection with autonomous weekly updates
          - Full source IP visibility in dashboard
          - Enhanced error handling and POSIX shell compatibility
          - Debian/Ubuntu package distribution
          
          ### 🔧 Quick Start
          
          **Snap Installation:**
          ```bash
          sudo wardenips.configure              # Initial setup
          sudo wardenips.edit                  # Edit configuration  
          sudo wardenips.start                 # Start service
          wardenips.logs                       # View colored logs
          # Dashboard: http://127.0.0.1:7680/
          ```
          
          **Debian Package:**
          ```bash
          # After installation
          sudo nano /opt/wardenips/config.yaml  # Configure
          sudo systemctl start wardenips        # Start service  
          wardenips logs                        # View colored logs
          # Dashboard: http://127.0.0.1:7680/
          ```
          
          ### 📋 System Requirements
          - Any modern Linux distribution with snap support OR Debian 11+ / Ubuntu 20.04+
          - Python 3.10+
          - systemd, ipset, iptables
          - Root access for firewall management
          
          See [README.md](https://github.com/msncakma/WardenIPS#readme) for complete documentation.
          EOF
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-deb.outputs.version }}
          name: WardenIPS v${{ needs.build-deb.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.build-deb.outputs.version, '-') }}
          files: |
            ${{ needs.build-deb.outputs.deb-file }}
            ${{ needs.build-snap.outputs.snap-file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  notify-success:
    name: Notify Success
    needs: [build-deb, build-snap, create-release]
    runs-on: ubuntu-22.04
    steps:
      - name: Success notification
        run: |
          echo "🎉 Successfully released WardenIPS v${{ needs.build-deb.outputs.version }}"
          echo "📦 Debian Package: ${{ needs.build-deb.outputs.deb-file }}"
          echo "📦 Snap Package: ${{ needs.build-snap.outputs.snap-file }}"
          echo "🔗 Release: https://github.com/msncakma/WardenIPS/releases/tag/v${{ needs.build-deb.outputs.version }}"